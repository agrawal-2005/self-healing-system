version: "3.9"

networks:
  healing-net:
    driver: bridge

services:

  # ── core-service ─────────────────────────────────────────────────────────────
  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: core-service
    ports:
      - "8001:8001"
    environment:
      SERVICE_NAME: "core-service"
      SLOW_DELAY_SECONDS: "5.0"
    networks:
      - healing-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── fallback-service ─────────────────────────────────────────────────────────
  fallback-service:
    build:
      context: ./fallback-service
      dockerfile: Dockerfile
    container_name: fallback-service
    ports:
      - "8002:8002"
    environment:
      SERVICE_NAME: "fallback-service"
    networks:
      - healing-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── api-service ───────────────────────────────────────────────────────────────
  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: api-service
    ports:
      - "8000:8000"
    # Load AWS credentials from monitor/.env so boto3 can publish CloudWatch metrics.
    # The environment block below takes precedence over any conflicting values in the file.
    env_file:
      - monitor/.env
    environment:
      SERVICE_NAME: "api-service"
      CORE_SERVICE_URL: "http://core-service:8001"
      FALLBACK_SERVICE_URL: "http://fallback-service:8002"
      REQUEST_TIMEOUT: "3.0"
      CIRCUIT_FAILURE_THRESHOLD: "3"
      CIRCUIT_RECOVERY_TIMEOUT_SECONDS: "30"
      CIRCUIT_HALF_OPEN_MAX_CALLS: "1"
      CLOUDWATCH_ENABLED: "true"
      CLOUDWATCH_NAMESPACE: "SelfHealingSystem"
      AWS_DEFAULT_REGION: "us-east-1"
    networks:
      - healing-net
    depends_on:
      core-service:
        condition: service_healthy
      fallback-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── recovery-agent ────────────────────────────────────────────────────────────
  # Mounts the host Docker socket so it can run "docker restart/stop/start".
  # WARNING: mounting /var/run/docker.sock gives this container full control
  # over the host Docker daemon.  Acceptable for local dev; harden in production.
  recovery-agent:
    build:
      context: ./recovery-agent
      dockerfile: Dockerfile
    container_name: recovery-agent
    ports:
      - "8003:8003"
    # Load AWS credentials from monitor/.env so boto3 can publish CloudWatch metrics.
    env_file:
      - monitor/.env
    environment:
      SERVICE_NAME: "recovery-agent"
      DOCKER_COMMAND_TIMEOUT: "30"
      RECOVERY_TOKEN: "dev-token"
      ALLOWED_SERVICES: "core-service"
      RECOVERY_HISTORY_PATH: "/app/data/recovery_history.jsonl"
      CLOUDWATCH_ENABLED: "true"
      CLOUDWATCH_NAMESPACE: "SelfHealingSystem"
      AWS_DEFAULT_REGION: "us-east-1"
    volumes:
      # Mount the host Docker socket — required for docker CLI to work inside container
      - /var/run/docker.sock:/var/run/docker.sock
      - ./recovery-agent/data:/app/data
    networks:
      - healing-net
    depends_on:
      - api-service
      - core-service
      - fallback-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
