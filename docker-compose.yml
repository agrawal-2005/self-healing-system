networks:
  healing-net:
    driver: bridge

services:

  # ── core-service ─────────────────────────────────────────────────────────────
  core-service:
    build:
      context: ./demo-services/core-service
      dockerfile: Dockerfile
    container_name: core-service
    ports:
      - "8001:8001"
    environment:
      SERVICE_NAME: "core-service"
      SLOW_DELAY_SECONDS: "5.0"
    networks:
      - healing-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── fallback-service ─────────────────────────────────────────────────────────
  fallback-service:
    build:
      context: ./fallback-service
      dockerfile: Dockerfile
    container_name: fallback-service
    ports:
      - "8002:8002"
    environment:
      SERVICE_NAME: "fallback-service"
    networks:
      - healing-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── api-service ───────────────────────────────────────────────────────────────
  # Phase 8: config-driven gateway — service URLs and strategies come from
  # services_config.json (mounted below), not from environment variables.
  # Adding a new downstream service = edit services_config.json only.
  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: api-service
    ports:
      - "8000:8000"
    env_file:
      - monitor/.env
    environment:
      SERVICE_NAME: "api-service"
      FALLBACK_SERVICE_URL: "http://fallback-service:8002"
      SERVICES_CONFIG_PATH: "/app/services_config.json"
      REQUEST_TIMEOUT: "2.0"
      CIRCUIT_FAILURE_THRESHOLD: "3"
      CIRCUIT_RECOVERY_TIMEOUT_SECONDS: "30"
      CIRCUIT_HALF_OPEN_MAX_CALLS: "1"
      CLOUDWATCH_ENABLED: "true"
      CLOUDWATCH_NAMESPACE: "SelfHealingSystem"
      AWS_DEFAULT_REGION: "us-east-1"
    volumes:
      # Mount shared config so the gateway picks up new services without rebuild
      - ./services_config.json:/app/services_config.json:ro
    networks:
      - healing-net
    depends_on:
      core-service:
        condition: service_healthy
      fallback-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── recovery-agent ────────────────────────────────────────────────────────────
  # Mounts the host Docker socket so it can run "docker restart/stop/start".
  # WARNING: mounting /var/run/docker.sock gives this container full control
  # over the host Docker daemon.  Acceptable for local dev; harden in production.
  recovery-agent:
    build:
      context: ./recovery-agent
      dockerfile: Dockerfile
    container_name: recovery-agent
    ports:
      - "8003:8003"
    # Load AWS credentials from monitor/.env so boto3 can publish CloudWatch metrics.
    env_file:
      - monitor/.env
    environment:
      SERVICE_NAME: "recovery-agent"
      DOCKER_COMMAND_TIMEOUT: "30"
      RECOVERY_TOKEN: "dev-token"
      # Phase 7: all registered services are allowed
      ALLOWED_SERVICES: "core-service,payment-service,movie-service,fallback-service"
      RECOVERY_HISTORY_PATH: "/app/data/recovery_history.jsonl"
      CLOUDWATCH_ENABLED: "true"
      CLOUDWATCH_NAMESPACE: "SelfHealingSystem"
      AWS_DEFAULT_REGION: "us-east-1"
      # ── S3 crash report storage (real incidents only) ──
      # Set the bucket env var to enable; leave empty to keep reports local-only.
      S3_CRASH_REPORTS_BUCKET: "${S3_CRASH_REPORTS_BUCKET:-}"
      S3_CRASH_REPORTS_PREFIX: "incidents"
    volumes:
      # Mount the host Docker socket — required for docker CLI to work inside container
      - /var/run/docker.sock:/var/run/docker.sock
      - ./recovery-agent/data:/app/data
    networks:
      - healing-net
    depends_on:
      - api-service
      - core-service
      - fallback-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ── payment-service ───────────────────────────────────────────────────────────
  # Demo service: critical payment processor. Strategy=escalate, no fallback.
  payment-service:
    build:
      context: ./demo-services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8010:8010"
    environment:
      SERVICE_NAME: "payment-service"
    networks:
      - healing-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── movie-service ─────────────────────────────────────────────────────────────
  # Demo service: movie catalog. Strategy=fallback → routes to fallback-service on failure.
  movie-service:
    build:
      context: ./demo-services/movie-service
      dockerfile: Dockerfile
    container_name: movie-service
    ports:
      - "8020:8020"
    environment:
      SERVICE_NAME: "movie-service"
    networks:
      - healing-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s

